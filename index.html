<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>2차 종합 모의고사</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.6;-webkit-text-size-adjust:100%}
.container{max-width:640px;margin:0 auto;padding:16px}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:20px;font-weight:800;color:#f8fafc;margin-bottom:4px}
.header p{font-size:13px;color:#94a3b8}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.card h2{font-size:16px;color:#60a5fa;margin-bottom:12px}
.input-wrap label{display:block;font-size:12px;color:#94a3b8;margin-bottom:6px}
.input-wrap input{width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#f8fafc;font-size:15px;outline:none}
.input-wrap input:focus{border-color:#3b82f6}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;margin-top:16px}
.btn-secondary{background:#334155;color:#94a3b8;margin-top:10px;font-size:13px;padding:10px}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.section-title{background:linear-gradient(135deg,#1e3a5f,#1e293b);padding:12px 16px;margin:20px 0 12px;border-radius:12px;font-size:14px;font-weight:700;color:#60a5fa;border-left:4px solid #3b82f6}
.q-card{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #334155}
.q-num{display:inline-block;background:#3b82f6;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:8px}
.q-text{font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:12px;line-height:1.7}
.opt-list{display:flex;flex-direction:column;gap:6px}
.opt-btn{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#0f172a;border-radius:10px;cursor:pointer;transition:all .15s;border:1.5px solid transparent}
.opt-btn:active{transform:scale(0.98)}
.opt-btn.selected{background:#1e3a5f;border-color:#3b82f6}
.opt-circle{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid #475569;display:flex;align-items:center;justify-content:center;font-size:11px;color:#94a3b8;margin-top:1px}
.opt-btn.selected .opt-circle{background:#3b82f6;border-color:#3b82f6;color:#fff}
.opt-btn span:last-child{font-size:13px;color:#cbd5e1;line-height:1.5}
.progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#3b82f6,#60a5fa);z-index:100;transition:width .3s}
.progress-info{text-align:center;font-size:12px;color:#64748b;margin:10px 0}
.submit-area{padding:20px 0 40px;text-align:center}
.lock-screen{text-align:center;padding:40px 20px}
.lock-screen .icon{font-size:48px;margin-bottom:16px}
.lock-input{width:200px;padding:14px;background:#0f172a;border:2px solid #334155;border-radius:12px;color:#f8fafc;font-size:18px;text-align:center;letter-spacing:4px;outline:none;margin:0 auto;display:block}
.lock-input:focus{border-color:#3b82f6}
.lock-msg{font-size:13px;margin-top:10px;min-height:20px}
.result-header{text-align:center;padding:20px 0}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;border:4px solid}
.score-circle.pass{border-color:#22c55e;color:#22c55e}
.score-circle.fail{border-color:#ef4444;color:#ef4444}
.score-circle .num{font-size:36px;font-weight:800;line-height:1}
.score-circle .unit{font-size:12px;margin-top:2px}
.score-detail{font-size:13px;color:#94a3b8;margin-top:8px}
.r-card{background:#1e293b;border-radius:14px;padding:14px;margin-bottom:10px;border-left:4px solid}
.r-card.correct{border-color:#22c55e}
.r-card.wrong{border-color:#ef4444}
.r-q{font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:8px;line-height:1.6}
.r-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:6px}
.r-badge.correct{background:#166534;color:#86efac}
.r-badge.wrong{background:#7f1d1d;color:#fca5a5}
.r-ans{font-size:12px;color:#94a3b8;margin-bottom:4px}
.r-expl{font-size:12px;color:#64748b;line-height:1.6;padding:8px;background:#0f172a;border-radius:8px;margin-top:6px}
.admin-panel{max-width:640px;margin:0 auto;padding:16px}
.adm-section{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #334155}
.adm-section h3{font-size:15px;color:#60a5fa;margin-bottom:12px}
.guide-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #334155}
.guide-step:last-child{border:none}
.guide-num{flex-shrink:0;width:28px;height:28px;background:#3b82f6;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.guide-text{font-size:13px;line-height:1.7;color:#cbd5e1}
.guide-text b{color:#60a5fa}
.kakao-msg{background:#0f172a;border-radius:10px;padding:14px;margin:10px 0;font-size:13px;line-height:1.8;color:#fbbf24;border:1px dashed #92400e;word-break:keep-all}
.copy-btn{display:inline-block;padding:6px 14px;background:#334155;color:#e2e8f0;border:none;border-radius:8px;font-size:12px;cursor:pointer;margin-top:6px}
.hidden{display:none!important}
</style>
</head>

<div class="progress-bar" id="progBar"></div>

  <div id="examBody"></div>
  <div class="submit-area">
    <button class="btn btn-danger" id="submitBtn" onclick="submitExam()">답안 제출</button>
  </div>
</div>

  <div class="lock-screen">
    <div class="icon">🔒</div>
    <h2 style="font-size:18px;margin-bottom:8px">답안이 제출되었습니다</h2>

    <input type="text" class="lock-input" id="unlockInput" placeholder="코드" maxlength="10" inputmode="numeric">
    <button class="btn btn-primary" style="width:200px;margin:12px auto" onclick="tryUnlock()">결과 확인</button>
    <p class="lock-msg" id="lockMsg"></p>
    <p style="font-size:12px;color:#475569;margin-top:20px">시험 종료 후 관리자가 카카오톡에<br>결과확인 코드를 안내합니다</p>
  </div>

<script>
let userName="";
let answers=new Array(TOTAL).fill(0);
let submitted=false;

function startExam(){
  const n=document.getElementById("nameInput").value.trim();
  if(!n){alert("이름을 입력해 주세요.");return}
  userName=n;
  const saved=localStorage.getItem("exam2nd_"+userName);
  if(saved){
    const d=JSON.parse(saved);
    answers=d.answers;
    submitted=true;
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("lockScreen").classList.remove("hidden");
    return;
  }
  buildExam();
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("examScreen").classList.remove("hidden");
  updateProgress();
}

function buildExam(){
  let h="";let si=0;
  Q.forEach((q,i)=>{
    if(si<SECS.length&&(i+1)===SECS[si].s){h+=`<div class="section-title">${SECS[si].t}</div>`;si++}
    h+=`<div class="q-card" id="q${i}"><span class="q-num">${i+1}번</span><div class="q-text">${q.q}</div><div class="opt-list">`;
    q.o.forEach((o,j)=>{h+=`<div class="opt-btn" data-q="${i}" data-o="${j+1}" onclick="selectOpt(this,${i},${j+1})"><span class="opt-circle">${C[j]}</span><span>${o}</span></div>`});
    h+=`</div></div>`;
  });
  document.getElementById("examBody").innerHTML=h;
}

function selectOpt(el,qi,oi){
  if(submitted)return;
  const opts=el.parentElement.children;
  for(let o of opts)o.classList.remove("selected");
  el.classList.add("selected");
  answers[qi]=oi;
  updateProgress();
}

function updateProgress(){
  const a=answers.filter(x=>x>0).length;
  document.getElementById("progBar").style.width=(a/TOTAL*100)+"%";
  document.getElementById("progInfo").textContent=`${a} / ${TOTAL} 문항 응답 완료`;
}

function submitExam(){
  const a=answers.filter(x=>x>0).length;
  const u=TOTAL-a;
  let msg=`총 ${TOTAL}문항 중 ${a}문항 응답하셨습니다.`;
  if(u>0)msg+=`\n미응답 ${u}문항이 있습니다.`;
  msg+="\n\n제출하시겠습니까? 제출 후에는 수정할 수 없습니다.";
  if(!confirm(msg))return;
  submitted=true;
  localStorage.setItem("exam2nd_"+userName,JSON.stringify({answers:answers,time:new Date().toISOString()}));
  document.getElementById("examScreen").classList.add("hidden");
  document.getElementById("lockScreen").classList.remove("hidden");
  document.getElementById("progBar").style.width="100%";
}

function tryUnlock(){
  const code=document.getElementById("unlockInput").value.trim();
  if(code===UNLOCK_CODE){showResult()}
  else{document.getElementById("lockMsg").textContent="코드가 일치하지 않습니다.";document.getElementById("lockMsg").style.color="#ef4444"}
}

function showResult(){
  document.getElementById("lockScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");
  let correct=0;
  answers.forEach((a,i)=>{if(a===ANS[i])correct++});
  const score=Math.round(correct/TOTAL*100);
  const pass=correct>=PASS_SCORE;
  let h=`<div class="result-header"><div class="score-circle ${pass?'pass':'fail'}"><div class="num">${score}</div><div class="unit">점</div></div>`;
  h+=`<h2 style="font-size:18px;color:${pass?'#22c55e':'#ef4444'}">${pass?'🎉 합격':'다시 도전해 보세요'}</h2>`;
  h+=`<div class="score-detail">${TOTAL}문항 중 ${correct}문항 정답 (합격기준: ${PASS_SCORE}문항)</div></div>`;

  let si=0;
  Q.forEach((q,i)=>{
    if(si<SECS.length&&(i+1)===SECS[si].s){h+=`<div class="section-title">${SECS[si].t}</div>`;si++}
    const ok=answers[i]===ANS[i];
    h+=`<div class="r-card ${ok?'correct':'wrong'}">`;
    h+=`<span class="r-badge ${ok?'correct':'wrong'}">${ok?'✓ 정답':'✗ 오답'}</span>`;
    h+=`<div class="r-q">${i+1}. ${q.q}</div>`;
    if(!ok)h+=`<div class="r-ans">내 답: ${C[answers[i]-1]||'미응답'} ${answers[i]>0?q.o[answers[i]-1]:''}</div>`;
    h+=`<div class="r-ans" style="color:#60a5fa">정답: ${C[ANS[i]-1]} ${q.o[ANS[i]-1]}</div>`;
    h+=`<div class="r-expl">💡 ${q.e}</div></div>`;
  });

  h+=`<div style="padding:20px 0;text-align:center"><button class="btn btn-secondary" onclick="resetExam()">다시 시험 보기</button></div>`;
  document.getElementById("resultScreen").innerHTML=h;
}

function resetExam(){
  localStorage.removeItem("exam2nd_"+userName);
  location.reload();
}

function showAdmin(){
  const pw=prompt("관리자 비밀번호를 입력하세요:");
  if(pw!==ADMIN_PW){if(pw!==null)alert("비밀번호가 일치하지 않습니다.");return}
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("adminScreen").classList.remove("hidden");

  let h="";
  h+=`<div class="adm-section"><h3>📋 시험 운영 가이드</h3>`;
  h+=`<div class="guide-step"><div class="guide-num">1</div><div class="guide-text"><b>시험 전</b> — index.html을 Netlify Drop에 업로드 후 링크를 카카오톡 단체방에 공유합니다.</div></div>`;
  h+=`<div class="guide-step"><div class="guide-num">2</div><div class="guide-text"><b>시험 중</b> — 교육생이 링크를 터치하여 이름 입력 후 응시합니다.</div></div>`;
  h+=`<div class="guide-step"><div class="guide-num">3</div><div class="guide-text"><b>시험 후</b> — 아래 카카오톡 안내 문구를 단체방에 전송합니다.</div></div></div>`;

  const kakao1=`📝 2차 종합 모의고사 안내\n\n아래 링크를 터치하여 시험에 응시해 주세요.\n이름을 입력하신 후 시험이 시작됩니다.\n\n⏰ 시험 시간: 제한 없음\n📌 총 60문항 (제5장~제7장 기출 종합)\n✅ 60점 이상 합격\n\n👉 시험 링크: (여기에 링크 붙여넣기)`;
  const kakao2=`✅ 시험이 종료되었습니다.\n\n결과확인 코드: ${UNLOCK_CODE}\n\n제출 화면에서 위 코드를 입력하면\n점수와 해설을 확인할 수 있습니다.\n\n60문항 중 ${PASS_SCORE}문항(60점) 이상이면 합격입니다.`;

  h+=`<div class="adm-section"><h3>💬 카카오톡 발송 문구</h3>`;
  h+=`<p style="font-size:12px;color:#94a3b8;margin-bottom:8px">아래 문구를 복사하여 카카오톡에 붙여넣기 하세요</p>`;
  h+=`<div class="kakao-msg">${kakao1.replace(/\n/g,"<br>")}</div>`;
  h+=`<button class="copy-btn" onclick="copyText(\`${kakao1}\`)">📋 시험 안내 복사</button>`;
  h+=`<div class="kakao-msg" style="margin-top:16px">${kakao2.replace(/\n/g,"<br>")}</div>`;
  h+=`<button class="copy-btn" onclick="copyText(\`${kakao2}\`)">📋 결과 안내 복사</button></div>`;

  h+=`<div class="adm-section"><h3>📊 정답표 (60문항)</h3><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:10px">`;
  ANS.forEach((a,i)=>{h+=`<div style="text-align:center;padding:6px 0;background:#0f172a;border-radius:8px;font-size:12px"><span style="color:#64748b">${i+1}.</span> <span style="color:#60a5fa;font-weight:700">${C[a-1]}</span></div>`});
  h+=`</div></div>`;

  document.getElementById("admContent").innerHTML=h;
}

function hideAdmin(){
  document.getElementById("adminScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}

function copyText(t){navigator.clipboard.writeText(t).then(()=>alert("복사되었습니다!")).catch(()=>{const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("복사되었습니다!")})}
</script>
</body>
</html>
